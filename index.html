function StationSummaryTable({ data, c }) {
  const [sortCol, setSortCol] = useState("medTat");
  const [sortDir, setSortDir] = useState("asc");
  const handleSort = col => {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("asc"); }
  };
  const sorted = [...data].sort((a,b) => {
    const av = a[sortCol] ?? (sortDir==="asc"?Infinity:-Infinity);
    const bv = b[sortCol] ?? (sortDir==="asc"?Infinity:-Infinity);
    return sortDir === "asc" ? av - bv : bv - av;
  });
  const cols = [
    { key:"station",  label:"Station",       align:"left",  fmt: v => v,                                  color: () => null },
    { key:"wos",      label:"WOs",           align:"right", fmt: v => v,                                  color: v => v===0 ? c.red : v>=40 ? c.green : null },
    { key:"medTat",   label:"Med TAT",       align:"right", fmt: v => v!=null ? v+"d" : "—",              color: v => v==null ? c.red : v<=1 ? c.green : v<=2 ? c.amber : c.red },
    { key:"avgTat",   label:"Avg TAT",       align:"right", fmt: v => v!=null ? v+"d" : "—",              color: v => v==null ? c.red : v<=2 ? c.green : v<=4 ? c.amber : c.red },
    { key:"smR",      label:"SM Resched",    align:"right", fmt: v => v,                                  color: v => v>=10 ? c.red : v>=5 ? c.amber : null },
    { key:"transfer", label:"Transfer Fail", align:"right", fmt: v => v,                                  color: v => v>=15 ? c.red : v>=8 ? c.amber : null },
  ];
  const SortArrow = ({col}) => {
    if (sortCol !== col) return React.createElement("span", {style:{color:c.textMuted,marginLeft:3,opacity:0.4}}, "↕");
    return React.createElement("span", {style:{color:c.purple,marginLeft:3}}, sortDir==="asc"?"↑":"↓");
  };
  return (
    <>
      <div style={{ display:"flex",alignItems:"center",gap:10,margin:"0 0 12px",paddingBottom:8,borderBottom:"1px solid "+c.borderLight }}>
        <span style={{ fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:c.textSec }}>Network Summary</span>
        <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:5,background:c.purpleBg,color:c.purple,border:"1px solid "+c.purpleBorder }}>WK11 · Click column to sort</span>
      </div>
      <div style={{ background:c.card,border:"1px solid "+c.border,borderRadius:12,overflow:"auto",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:12 }}>
        <table style={{ width:"100%",borderCollapse:"collapse",minWidth:600 }}>
          <thead>
            <tr>
              {cols.map(col => (
                <th key={col.key} onClick={() => handleSort(col.key)} style={{ fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",color:c.textMuted,padding:"12px 16px",textAlign:col.align,background:c.elevated,borderBottom:"1px solid "+c.border,cursor:"pointer",userSelect:"none",whiteSpace:"nowrap" }}>
                  {col.label}<SortArrow col={col.key}/>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.map((s,i) => {
              const statusColor  = s.medTat==null ? c.red : s.medTat<=1 ? c.green : s.medTat<=2 ? c.amber : c.red;
              const statusLabel  = s.medTat==null ? "NO COVERAGE" : s.medTat<=1 ? "ON TARGET" : s.medTat<=2 ? "WATCH" : "CRITICAL";
              const statusBg     = s.medTat==null ? c.redBg : s.medTat<=1 ? c.greenBg : s.medTat<=2 ? c.amberBg : c.redBg;
              const statusBorder = s.medTat==null ? "#FECACA" : s.medTat<=1 ? "#A7F3D0" : s.medTat<=2 ? "#FDE68A" : "#FECACA";
              return (
                <tr key={s.station} style={{ borderLeft:"3px solid "+statusColor }}>
                  <td style={{ padding:"11px 16px",borderBottom:"1px solid "+c.borderLight }}>
                    <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                      <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color:statusColor }}>{s.station}</span>
                      <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:3,background:statusBg,color:statusColor,border:"1px solid "+statusBorder }}>{statusLabel}</span>
                    </div>
                  </td>
                  {cols.slice(1).map(col => {
                    const val = s[col.key];
                    const fmtVal = col.fmt(val);
                    const cellColor = col.color(val);
                    return (
                      <td key={col.key} style={{ padding:"11px 16px",borderBottom:"1px solid "+c.borderLight,textAlign:col.align,fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:cellColor?700:500,color:cellColor||c.text }}>
                        {fmtVal}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{ background:c.elevated }}>
              <td style={{ padding:"10px 16px",fontSize:11,fontWeight:700,color:c.textMuted,borderTop:"1px solid "+c.border }}>NETWORK</td>
              <td style={{ padding:"10px 16px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:c.purple,borderTop:"1px solid "+c.border }}>{data.reduce((a,s)=>a+s.wos,0)}</td>
              <td style={{ padding:"10px 16px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:c.textMuted,borderTop:"1px solid "+c.border }}>—</td>
              <td style={{ padding:"10px 16px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:c.textMuted,borderTop:"1px solid "+c.border }}>—</td>
              <td style={{ padding:"10px 16px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:c.textMuted,borderTop:"1px solid "+c.border }}>{data.reduce((a,s)=>a+s.smR,0)}</td>
              <td style={{ padding:"10px 16px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:c.textMuted,borderTop:"1px solid "+c.border }}>{data.reduce((a,s)=>a+s.transfer,0)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
      <div style={{ fontSize:11,color:c.textMuted,marginBottom:4 }}>
        Color coding: <span style={{color:c.red,fontWeight:600}}>Red</span> = critical · <span style={{color:c.amber,fontWeight:600}}>Amber</span> = watch · <span style={{color:c.green,fontWeight:600}}>Green</span> = on target. SM Resched: red ≥10, amber ≥5. Transfer Fail: red ≥15, amber ≥8.
      </div>
    </>
  );
}

const isHit = (k, v) => { if (v === null || k.target === null) return false; return k.lowerBetter ? v <= k.target : v >= k.target; };
const getWow = (k) => { const v = k.values; if (v[6] === null || v[5] === null) return null; return +(v[6] - v[5]).toFixed(2); };
const getTrend = (k) => { const v = k.values; if (v[6] === null || v[5] === null) return "flat"; const wow = v[6] - v[5]; if (wow === 0) return "flat"; return k.lowerBetter ? (wow < 0 ? "improving" : "worsening") : (wow > 0 ? "improving" : "worsening"); };

const Pill = ({ type, children }) => {
  const styles = {
    hit: { bg: c.greenBg, color: c.green, border: "#A7F3D0" },

    improving: { bg: c.greenBg, color: c.green, border: "#A7F3D0" },

    tbd: { bg: c.amberBg, color: c.amber, border: "#FDE68A" },

    open: { bg: c.redBg, color: c.red, border: "#FECACA" },

};

      return <div key={i} style={{ flex:1,height:h,borderRadius:"3px 3px 0 0",background:v===null?c.border:hit?c.green:c.red,opacity:0.75,minWidth:6 }}/>;

const TrendChart = ({ kpi }) => {
  const vals = kpi.values.filter(x => x !== null);
  const mx = Math.max(...vals, kpi.target || Math.max(...vals)) * 1.25;
  const chartH = 130;
  const targetPct = kpi.target ? (kpi.target / mx) * 100 : null;
  return (
    <div style={{ background:c.card,border:`1px solid ${c.border}`,borderRadius:12,padding:20,boxShadow:"0 1px 3px rgba(0,0,0,0.04)" }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
        <span style={{ fontWeight:700,fontSize:15,color:c.text }}>{kpi.name}</span>
        <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:c.textMuted,background:c.elevated,padding:"3px 10px",borderRadius:5,border:`1px solid ${c.borderLight}` }}>Target: {kpi.targetLabel}</span>
      </div>
      <div style={{ position:"relative",height:chartH+40,display:"flex",alignItems:"flex-end",gap:6,paddingBottom:40 }}>
        {targetPct && (
          <div style={{ position:"absolute",left:0,right:0,bottom:40+(targetPct/100)*chartH,borderTop:`2px dashed ${c.amber}`,zIndex:2 }}>
            <span style={{ position:"absolute",right:0,transform:"translateY(-50%)",fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:600,color:c.amber,background:c.card,padding:"0 6px" }}>{kpi.target}{kpi.suffix||""}</span>
          </div>
        )}
        {kpi.values.map((v,i) => {
          if (v === null) return <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}>
            <div style={{ width:"100%",height:chartH*0.25,borderRadius:"4px 4px 0 0",background:c.border,opacity:0.3 }}/>
            <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:600,color:c.amber }}>TBD</span>
            <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:600,color:c.textMuted }}>{WEEKS[i]}</span>
          </div>;
          const h = Math.max((v / mx) * chartH, 4);
          const hit = isHit(kpi, v);
          const isLatest = i === kpi.values.length - 1;
          return <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}>
            <div style={{ width:"100%",height:h,borderRadius:"4px 4px 0 0",background:hit?c.green:c.red,opacity:isLatest?1:0.65,transition:"height 0.4s",border:isLatest?`2px solid ${hit?c.green:c.red}`:"none" }}/>
            <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:isLatest?800:600,color:isLatest?c.text:c.textSec }}>{(kpi.prefix||"")+v+(kpi.suffix||"")}</span>

          </div>;

      </div>
    </div>
  );

          <div style={{ display:"flex",gap:12,marginBottom:18,flexWrap:"wrap" }}>
            <ScoreCard label="Critical" value={ACTIONS.filter(a=>a.priority==="Critical").length} accent={c.red} />
            <ScoreCard label="High" value={ACTIONS.filter(a=>a.priority==="High").length} accent={c.orange} />
            <ScoreCard label="In Progress" value={ACTIONS.filter(a=>a.status==="In Progress").length} accent={c.purple} />
            <ScoreCard label="New This Week" value={ACTIONS.filter(a=>a.priorWeek==="New").length} accent={c.cyan} sub="From WK11 data" />
            <ScoreCard label="Completed (All Time)" value={COMPLETED_ACTIONS.length} accent={c.green} />
            <ScoreCard label="Amazon Asks" value={AMAZON_ASKS.length} accent={c.cyan} sub="2 open" />
          </div>

          <div style={{ display:"flex",gap:8,marginBottom:16,flexWrap:"wrap" }}>
            {["all","critical","high","medium"].map(f => (
              <button key={f} onClick={() => setActionFilter(f)} style={{ fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,padding:"7px 16px",borderRadius:8,border:`1px solid ${actionFilter===f?c.purple:c.border}`,background:actionFilter===f?c.purpleBg:c.card,color:actionFilter===f?c.purple:c.textMuted,cursor:"pointer",transition:"all 0.2s",textTransform:"capitalize" }}>
                {f === "all" ? `All (${ACTIONS.length})` : `${f.charAt(0).toUpperCase()+f.slice(1)} (${ACTIONS.filter(a=>a.priority.toLowerCase()===f).length})`}
              </button>
            ))}
          </div>

          <div style={{ display:"flex",flexDirection:"column",gap:8,marginBottom:28 }}>
            {filteredActions.map(a => {
              const priorityColor = a.priority==="Critical" ? c.red : a.priority==="High" ? c.orange : c.amber;
              const priorityBg = a.priority==="Critical" ? c.redBg : a.priority==="High" ? "#FFF7ED" : c.amberBg;
              const priorityBorder = a.priority==="Critical" ? "#FECACA" : a.priority==="High" ? "#FED7AA" : "#FDE68A";
              return (
                <div key={a.id} style={{ background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:"14px 18px",display:"grid",gridTemplateColumns:"36px 1fr auto",gap:14,alignItems:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.03)",borderLeft:`4px solid ${priorityColor}` }}>
                  <div style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,color:c.purple,background:c.purpleBg,border:`1px solid ${c.purpleBorder}`,borderRadius:6,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>{a.id}</div>
                  <div>
                    <div style={{ fontSize:13,fontWeight:600,color:c.text,lineHeight:1.4,marginBottom:6 }}>{a.name}</div>
                    <div style={{ display:"flex",gap:6,flexWrap:"wrap",alignItems:"center" }}>
                      <Pill type={a.status==="In Progress"?"improving":"miss"}>{a.status}</Pill>
                      <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:c.textMuted,background:c.elevated,padding:"2px 8px",borderRadius:4,border:`1px solid ${c.borderLight}` }}>{a.kpi}</span>
                      <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:c.textMuted,background:c.elevated,padding:"2px 8px",borderRadius:4,border:`1px solid ${c.borderLight}` }}>{a.owner}</span>
                      {a.priorWeek==="New" && <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:c.cyan,background:c.cyanBg,padding:"2px 8px",borderRadius:4,border:`1px solid ${c.cyanBorder}` }}>NEW</span>}
                      {a.priorWeek==="Carried" && <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:c.amber,background:c.amberBg,padding:"2px 8px",borderRadius:4,border:"1px solid #FDE68A" }}>CARRIED</span>}
                    </div>
                    <div style={{ fontSize:12,color:c.textMuted,marginTop:6,lineHeight:1.5 }}>{a.impact}</div>
                  </div>
                  <div style={{ textAlign:"center",flexShrink:0 }}>
                    <div style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,padding:"4px 10px",borderRadius:6,background:priorityBg,color:priorityColor,border:`1px solid ${priorityBorder}`,whiteSpace:"nowrap" }}>{a.priority}</div>
                    <div style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:c.textMuted,marginTop:4 }}>Due {a.due}</div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Amazon Asks */}
          <div style={{ display:"flex",alignItems:"center",gap:10,margin:"0 0 12px",paddingBottom:8,borderBottom:`1px solid ${c.borderLight}` }}>
            <span style={{ fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:c.textSec }}>Amazon Asks</span>
            <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:5,background:c.cyanBg,color:c.cyan,border:`1px solid ${c.cyanBorder}` }}>2 Open · Tracking Until Resolved</span>
          </div>
          <div style={{ display:"flex",flexDirection:"column",gap:8,marginBottom:28 }}>
            {AMAZON_ASKS.map(a => {
              const sc = a.status==="In Progress" ? c.green : a.status==="Closed" ? c.textMuted : c.cyan;
              const sb = a.status==="In Progress" ? c.greenBg : a.status==="Closed" ? c.elevated : c.cyanBg;
              const sbr = a.status==="In Progress" ? "#A7F3D0" : a.status==="Closed" ? c.borderLight : c.cyanBorder;
              const pc = a.priority==="High" ? c.orange : c.red;
              const pb = a.priority==="High" ? "#FFF7ED" : c.redBg;
              const pbr = a.priority==="High" ? "#FED7AA" : "#FECACA";
              return (
                <div key={a.id} style={{ background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:"14px 18px",display:"grid",gridTemplateColumns:"36px 1fr auto",gap:14,alignItems:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.03)",borderLeft:`4px solid ${c.cyan}` }}>
                  <div style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,color:c.cyan,background:c.cyanBg,border:`1px solid ${c.cyanBorder}`,borderRadius:6,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>{a.id}</div>
                  <div>
                    <div style={{ fontSize:13,fontWeight:600,color:c.text,lineHeight:1.4,marginBottom:6 }}>{a.ask}</div>
                    <div style={{ display:"flex",gap:6,flexWrap:"wrap",alignItems:"center" }}>
                      <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:4,background:sb,color:sc,border:`1px solid ${sbr}` }}>{a.status}</span>
                      <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:c.textMuted,background:c.elevated,padding:"2px 8px",borderRadius:4,border:`1px solid ${c.borderLight}` }}>{a.owner}</span>
                      <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:c.textMuted,background:c.elevated,padding:"2px 8px",borderRadius:4,border:`1px solid ${c.borderLight}` }}>Submitted {a.submitted}</span>
                    </div>
                    {a.notes && <div style={{ fontSize:12,color:c.textMuted,marginTop:6,lineHeight:1.5 }}>{a.notes}</div>}
                  </div>
                  <div style={{ textAlign:"center",flexShrink:0 }}>
                    <div style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,padding:"4px 10px",borderRadius:6,background:pb,color:pc,border:`1px solid ${pbr}`,whiteSpace:"nowrap" }}>{a.priority}</div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Completed Actions */}
          <div style={{ display:"flex",alignItems:"center",gap:10,margin:"0 0 12px",paddingBottom:8,borderBottom:`1px solid ${c.borderLight}` }}>
            <span style={{ fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:c.textSec }}>Completed Actions</span>
            <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:5,background:c.greenBg,color:c.green,border:"1px solid #A7F3D0" }}>{COMPLETED_ACTIONS.length} Closed</span>
          </div>
          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            {COMPLETED_ACTIONS.map(a => (
              <div key={a.id} style={{ background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:"12px 18px",display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"center",opacity:0.8,borderLeft:`4px solid ${c.green}` }}>
                <div>
                  <div style={{ fontSize:13,fontWeight:600,color:c.text,marginBottom:4 }}>{a.name}</div>
                  <div style={{ fontSize:12,color:c.textSec }}>{a.result}</div>
                </div>
                <div style={{ textAlign:"right",flexShrink:0 }}>
                  <Pill type="hit">Completed</Pill>
                  <div style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:c.textMuted,marginTop:4 }}>{a.completed}</div>
                </div>
              </div>
            ))}
          </div>
        </>}

        {/* ESCALATIONS */}
        {tab === "escalations" && (() => {
          const wk11Esc = ESCALATIONS.filter(e => e.week === "WK11");
          const priorEsc = ESCALATIONS.filter(e => e.week !== "WK11");
          const byStation = ESCALATIONS.reduce((acc, e) => { acc[e.station] = (acc[e.station]||0)+1; return acc; }, {});
          const byDsp = ESCALATIONS.reduce((acc, e) => { acc[e.dsp] = (acc[e.dsp]||0)+1; return acc; }, {});
          const byCat = ESCALATIONS.reduce((acc, e) => { acc[e.category] = (acc[e.category]||0)+1; return acc; }, {});

          const EscCard = ({ e, highlight }) => {
            const catColor = e.category === "Quality of Work" ? c.red : e.category === "Communication Issue" ? c.orange : c.amber;
            const catBg    = e.category === "Quality of Work" ? c.redBg : e.category === "Communication Issue" ? "#FFF7ED" : c.amberBg;
            const catBdr   = e.category === "Quality of Work" ? "#FECACA" : e.category === "Communication Issue" ? "#FED7AA" : "#FDE68A";
            return (
              <div style={{ background:c.card,border:`1px solid ${highlight?catColor:c.border}`,borderRadius:10,padding:"14px 18px",borderLeft:`4px solid ${catColor}`,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:10 }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:10 }}>
                  <div style={{ display:"flex",alignItems:"center",gap:8,flexWrap:"wrap" }}>
                    <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:c.purple }}>{e.id}</span>
                    <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:c.purpleBg,color:c.purple,border:`1px solid ${c.purpleBorder}` }}>{e.station}</span>
                    <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:c.elevated,color:c.textSec,border:`1px solid ${c.borderLight}` }}>{e.dsp}</span>
                    <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:catBg,color:catColor,border:`1px solid ${catBdr}` }}>{e.category}</span>
                    {highlight && <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:c.cyanBg,color:c.cyan,border:`1px solid ${c.cyanBorder}` }}>WK11</span>}
                  </div>
                  <div style={{ display:"flex",alignItems:"center",gap:8,flexShrink:0 }}>
                    <span style={{ fontSize:11,color:c.textMuted,fontFamily:"'JetBrains Mono',monospace" }}>{e.date}</span>
                    <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:c.greenBg,color:c.green,border:"1px solid #A7F3D0" }}>Closed</span>
                  </div>
                </div>
                <div style={{ fontSize:13,color:c.text,fontWeight:600,lineHeight:1.5,marginBottom:6 }}>{e.summary}</div>
                {e.detail && <div style={{ fontSize:12,color:c.textMuted,lineHeight:1.5,borderTop:`1px solid ${c.borderLight}`,paddingTop:6,marginTop:4 }}>{e.detail}</div>}
                <div style={{ fontSize:11,color:c.textMuted,marginTop:6 }}>Owner: {e.owner} · Resp SLA: {e.respSla?"✅":"❌"} · Res SLA: {e.resSla?"✅":"❌"}</div>
              </div>
            );
          };

          return (
            <>
              {/* Summary KPIs */}
              <div style={{ display:"flex",gap:12,marginBottom:20,flexWrap:"wrap" }}>
                <ScoreCard label="Total Escalations" value={ESCALATIONS.length} accent={c.purple} sub="All tracked weeks" />
                <ScoreCard label="WK11 Escalations" value={wk11Esc.length} accent={c.red} sub="Mar 8–14 submissions" />
                <ScoreCard label="Top Station" value="HTP2" accent={c.orange} sub={`${byStation['HTP2']||0} of ${ESCALATIONS.length} total`} />
                <ScoreCard label="Top DSP" value="ORMP" accent={c.red} sub={`${byDsp['ORMP']||0} escalations · HTP2`} />
                <ScoreCard label="All Closed" value="100%" accent={c.green} sub="Resp & Res SLA met on all" />
              </div>

              {/* Pattern Alert */}
              <div style={{ background:"linear-gradient(135deg,#FEF2F2,#FFF7ED)",border:`1px solid #FECACA`,borderRadius:12,padding:"14px 20px",marginBottom:20,display:"flex",alignItems:"flex-start",gap:12 }}>
                <span style={{ fontSize:20,flexShrink:0 }}>⚠️</span>
                <div>
                  <div style={{ fontWeight:700,fontSize:14,color:c.red,marginBottom:4 }}>ORMP / HTP2 — Systemic Pattern Across 10 Escalations</div>
                  <div style={{ fontSize:13,color:"#7F1D1D",lineHeight:1.6 }}>
                    Every escalation in the log except one (HDT3-SFR, SFRM) is from ORMP at HTP2. Two failure modes repeat across every case:
                    (1) <strong>Kooner unresponsive in Chime</strong> — ORMP explicitly noted this is the norm, not the exception.
                    (2) <strong>Documentation/paperwork quality</strong> — wrong paperwork returned, WOs disappeared from daily list, repairs not confirmed complete.
                    These cases are all closed and SLA-met, but the underlying issues are not resolved — ORMP is still escalating the same categories in WK11.
                  </div>
                </div>
              </div>

              {/* Category breakdown */}
              <div style={{ display:"flex",gap:12,marginBottom:20,flexWrap:"wrap" }}>
                {Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,cnt]) => {
                  const cc = cat==="Quality of Work"?c.red:cat==="Communication Issue"?c.orange:c.amber;
                  const cb = cat==="Quality of Work"?c.redBg:cat==="Communication Issue"?"#FFF7ED":c.amberBg;
                  return (
                    <div key={cat} style={{ flex:1,minWidth:160,background:c.card,border:`1px solid ${c.border}`,borderRadius:10,padding:"12px 16px",borderTop:`3px solid ${cc}`,boxShadow:"0 1px 3px rgba(0,0,0,0.04)" }}>
                      <div style={{ fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",color:c.textMuted,marginBottom:4 }}>{cat}</div>
                      <div style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:26,fontWeight:800,color:cc }}>{cnt}</div>
                      <div style={{ fontSize:11,color:c.textMuted,marginTop:4 }}>{Math.round(cnt/ESCALATIONS.length*100)}% of all escalations</div>
                    </div>
                  );
                })}
              </div>

              {/* WK11 Escalations */}
              <div style={{ display:"flex",alignItems:"center",gap:10,margin:"0 0 12px",paddingBottom:8,borderBottom:`1px solid ${c.borderLight}` }}>
                <span style={{ fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:c.textSec }}>WK11 Escalations</span>
                <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:5,background:c.redBg,color:c.red,border:"1px solid #FECACA" }}>{wk11Esc.length} Cases · Mar 8–14 · All HTP2 / ORMP</span>
              </div>
              <div style={{ marginBottom:28 }}>
                {wk11Esc.map((e,i) => <EscCard key={i} e={e} highlight={true} />)}
              </div>

              {/* Prior Escalations */}
              <div style={{ display:"flex",alignItems:"center",gap:10,margin:"0 0 12px",paddingBottom:8,borderBottom:`1px solid ${c.borderLight}` }}>
                <span style={{ fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:c.textSec }}>Prior Escalations</span>
                <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:5,background:c.elevated,color:c.textMuted,border:`1px solid ${c.borderLight}` }}>{priorEsc.length} Cases · Context & Pattern</span>
              </div>
              <div>
                {priorEsc.map((e,i) => <EscCard key={i} e={e} highlight={false} />)}
              </div>
            </>
          );
        })()}

      </div>

      <div style={{ textAlign:"center",padding:24,fontSize:12,color:c.textMuted,borderTop:`1px solid ${c.borderLight}` }}>
        Kooner Fleet Management Solutions · Last Mile Operations Dashboard · WK11 · Mar 8 – Mar 14, 2026 · WBR Wed Mar 18 @ 3:30 PM CST
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
